
{% extends 'base.html' %}
{% block content %}

<div class="card p-4 shadow-sm">

    <h5 class="mb-3">Add / Edit Contact</h5>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{category}} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">

        <div class="row">
            <div class="col-md-6 mb-3">
                <input name="first" placeholder="First Name" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <input name="last" placeholder="Last Name" class="form-control" required>
            </div>
        </div>

        <div class="mb-3">
            <input name="email" placeholder="Email" class="form-control" required>
        </div>

        <div class="mb-3">
            <input name="phone" placeholder="Phone" class="form-control" required>
        </div>

        <div class="mb-3">
            <textarea name="address" placeholder="Address" class="form-control"></textarea>
        </div>

        <button class="btn btn-success">Save</button>
        <a href="/" class="btn btn-secondary">Cancel</a>

    </form>

</div>

{% endblock %}
